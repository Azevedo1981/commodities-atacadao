<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Commodities Monitor · Atacadão</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --green-dark: #1a3a2a;
    --green-mid: #2d5a3d;
    --green-accent: #4a9e6b;
    --green-light: #e8f5ee;
    --cream: #faf8f3;
    --text-dark: #1a1a1a;
    --text-mid: #4a4a4a;
    --text-light: #888;
    --red: #e53e3e;
    --red-light: #fff5f5;
    --green-up: #276749;
    --green-up-bg: #f0fff4;
    --border: #e8e4dc;
    --card-bg: #ffffff;
    --shadow: 0 2px 12px rgba(0,0,0,0.06);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--text-dark);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--green-dark);
    padding: 0 24px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 20px rgba(0,0,0,0.3);
  }

  .header-inner {
    max-width: 1400px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
  }

  .brand { display: flex; align-items: center; gap: 12px; }

  .brand-logo {
    width: 36px; height: 36px;
    background: var(--green-accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }

  .brand-text h1 {
    font-size: 16px; font-weight: 700;
    color: #fff; letter-spacing: 0.5px;
  }

  .brand-text p {
    font-size: 10px; font-weight: 500;
    color: var(--green-accent); letter-spacing: 2px; text-transform: uppercase;
  }

  .header-date {
    display: flex; align-items: center; gap: 8px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 13px; color: rgba(255,255,255,0.85);
    font-family: 'DM Mono', monospace;
  }

  .date-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--green-accent);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* TICKER */
  .ticker-bar {
    background: var(--green-mid);
    padding: 8px 0;
    overflow: hidden;
  }

  .ticker-track {
    display: flex; gap: 32px;
    animation: ticker 30s linear infinite;
    white-space: nowrap;
  }

  @keyframes ticker {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  .ticker-item {
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; color: rgba(255,255,255,0.85);
    font-family: 'DM Mono', monospace;
  }

  .ticker-name { color: rgba(255,255,255,0.5); }
  .ticker-price { color: #fff; font-weight: 500; }
  .ticker-var.up { color: #6ee7a0; }
  .ticker-var.down { color: #fc8181; }
  .ticker-var.neutral { color: rgba(255,255,255,0.5); }

  /* SUMMARY BAR */
  .summary-bar {
    background: var(--green-dark);
    border-top: 1px solid rgba(255,255,255,0.08);
    padding: 10px 24px;
  }

  .summary-inner {
    max-width: 1400px;
    margin: 0 auto;
    display: flex; gap: 32px; align-items: center;
    flex-wrap: wrap;
  }

  .summary-group { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

  .summary-label {
    font-size: 10px; font-weight: 600; letter-spacing: 1.5px;
    text-transform: uppercase; color: rgba(255,255,255,0.4);
    display: flex; align-items: center; gap-4px;
  }

  .summary-chip {
    background: rgba(255,255,255,0.07);
    border-radius: 4px;
    padding: 3px 8px;
    font-size: 12px; color: rgba(255,255,255,0.85);
    display: flex; align-items: center; gap: 4px;
  }

  .summary-chip.up { color: #6ee7a0; }
  .summary-chip.down { color: #fc8181; }

  /* MAIN */
  main {
    max-width: 1400px;
    margin: 0 auto;
    padding: 28px 24px;
  }

  .section-title {
    font-size: 11px; font-weight: 600; letter-spacing: 2px;
    text-transform: uppercase; color: var(--text-light);
    margin-bottom: 16px;
    display: flex; align-items: center; gap: 8px;
  }

  .section-title::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }

  /* GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 16px;
    margin-bottom: 40px;
  }

  /* CARD */
  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    box-shadow: var(--shadow);
    transition: transform 0.15s, box-shadow 0.15s;
    cursor: pointer;
    text-decoration: none;
    display: block;
    color: inherit;
  }

  .card:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.1);
  }

  .card-top {
    display: flex; align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 8px;
  }

  .card-icon { font-size: 22px; }

  .card-spark { flex: 1; margin: 0 8px; }

  .card-name {
    font-size: 11px; font-weight: 600; letter-spacing: 1px;
    text-transform: uppercase; color: var(--text-light);
    margin-bottom: 4px;
  }

  .card-price {
    font-size: 22px; font-weight: 700;
    color: var(--text-dark); line-height: 1;
    margin-bottom: 2px;
  }

  .card-unit {
    font-size: 11px; color: var(--text-light);
    margin-bottom: 12px;
  }

  .card-divider {
    height: 1px; background: var(--border);
    margin-bottom: 10px;
  }

  .card-stats { display: flex; flex-direction: column; gap: 4px; }

  .card-stat {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 12px;
  }

  .stat-label { color: var(--text-light); }
  .stat-value { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-mid); }

  .badge {
    display: inline-flex; align-items: center; gap: 3px;
    padding: 2px 7px; border-radius: 4px;
    font-size: 11px; font-weight: 600;
    font-family: 'DM Mono', monospace;
  }

  .badge.up { background: var(--green-up-bg); color: var(--green-up); }
  .badge.down { background: var(--red-light); color: var(--red); }
  .badge.neutral { background: #f5f5f5; color: #888; }

  .card-footer {
    margin-top: 10px;
    font-size: 10px; color: var(--text-light);
    display: flex; justify-content: space-between; align-items: center;
  }

  /* TABLE */
  .table-wrap {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: var(--shadow);
  }

  table { width: 100%; border-collapse: collapse; }

  thead { background: var(--green-dark); }

  th {
    padding: 12px 16px;
    text-align: left;
    font-size: 10px; font-weight: 600;
    letter-spacing: 1.5px; text-transform: uppercase;
    color: rgba(255,255,255,0.6);
  }

  td {
    padding: 12px 16px;
    font-size: 13px;
    border-bottom: 1px solid var(--border);
  }

  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--green-light); }

  .td-commodity { display: flex; align-items: center; gap: 10px; }
  .td-icon { font-size: 18px; }
  .td-name { font-weight: 600; font-size: 13px; }
  .td-unit { font-size: 10px; color: var(--text-light); }
  .td-price { font-family: 'DM Mono', monospace; font-weight: 600; }
  .td-spark { width: 60px; }

  /* LOADING */
  .loading {
    text-align: center; padding: 80px 20px;
    color: var(--text-light); font-size: 14px;
  }

  .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--green-accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .error-msg {
    background: #fff5f5; border: 1px solid #fed7d7;
    border-radius: 8px; padding: 16px; color: #c53030;
    font-size: 13px; margin: 20px 0;
  }

  @media (max-width: 600px) {
    .grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .card-price { font-size: 18px; }
    .summary-bar { display: none; }
    main { padding: 16px; }
    .table-wrap { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="brand">
      <div class="brand-logo">🌾</div>
      <div class="brand-text">
        <h1>Commodities Monitor</h1>
        <p>Atacadão · Mercado</p>
      </div>
    </div>
    <div class="header-date">
      <div class="date-dot"></div>
      <span id="header-date">Carregando...</span>
    </div>
  </div>
</header>

<div class="ticker-bar">
  <div class="ticker-track" id="ticker-track">
    <span style="color:rgba(255,255,255,0.4);font-size:12px;padding:0 20px;">Carregando dados...</span>
  </div>
</div>

<div class="summary-bar">
  <div class="summary-inner" id="summary-bar">
    <div class="summary-group">
      <span class="summary-label">▲ Altas</span>
      <span id="altas-chips" style="display:flex;gap:6px;flex-wrap:wrap;"></span>
    </div>
    <div class="summary-group">
      <span class="summary-label">▼ Baixas</span>
      <span id="baixas-chips" style="display:flex;gap:6px;flex-wrap:wrap;"></span>
    </div>
  </div>
</div>

<main>
  <div class="section-title" id="section-title">📊 Preços · Tendência 4 Semanas</div>
  <div class="grid" id="cards-grid">
    <div class="loading"><div class="spinner"></div>Carregando preços...</div>
  </div>

  <div class="section-title">📋 Tabela Comparativa</div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Commodity</th>
          <th>Spark</th>
          <th>Semana ant.</th>
          <th>Atual</th>
          <th>Var. Semana</th>
          <th>Var. 4 Sem.</th>
        </tr>
      </thead>
      <tbody id="table-body">
        <tr><td colspan="6" class="loading">Carregando...</td></tr>
      </tbody>
    </table>
  </div>
</main>

<script>
const ICONS = {
  soja: '🫘', milho: '🌽', 'boi-gordo': '🐄', cafe: '☕',
  acucar: '🍬', frango: '🐔', suino: '🐷', trigo: '🌾',
  arroz: '🍚', feijao: '🫘', leite: '🥛'
};

const NAMES = {
  soja: 'Soja', milho: 'Milho', 'boi-gordo': 'Boi Gordo', cafe: 'Café Arábica',
  acucar: 'Açúcar Cristal', frango: 'Frango Vivo', suino: 'Suíno Vivo',
  trigo: 'Trigo', arroz: 'Arroz em Casca', feijao: 'Feijão Carioca', leite: 'Leite'
};

const UNITS = {
  soja: 'saca 60kg · PR', milho: 'saca 60kg · SP', 'boi-gordo': 'arroba · SP',
  cafe: 'saca 60kg · SP', acucar: 'saca 50kg · SP', frango: 'kg · SP',
  suino: 'kg · SP', trigo: 'saca 60kg · PR', arroz: 'saca 50kg · RS',
  feijao: 'saca 60kg · PR', leite: 'por litro · SP'
};

const CEPEA = {
  soja: 'https://cepea.esalq.usp.br/br/indicador/soja.aspx',
  milho: 'https://cepea.esalq.usp.br/br/indicador/milho.aspx',
  'boi-gordo': 'https://cepea.esalq.usp.br/br/indicador/boi-gordo.aspx',
  cafe: 'https://cepea.esalq.usp.br/br/indicador/cafe.aspx',
  acucar: 'https://cepea.esalq.usp.br/br/indicador/acucar.aspx',
  frango: 'https://cepea.esalq.usp.br/br/indicador/frango.aspx',
  suino: 'https://cepea.esalq.usp.br/br/indicador/suino.aspx',
  trigo: 'https://cepea.esalq.usp.br/br/indicador/trigo.aspx',
  arroz: 'https://cepea.esalq.usp.br/br/indicador/arroz.aspx',
  feijao: 'https://cepea.esalq.usp.br/br/indicador/feijao.aspx',
  leite: 'https://cepea.esalq.usp.br/br/indicador/leite.aspx'
};

const COLORS = {
  soja: '#16a34a', milho: '#ca8a04', 'boi-gordo': '#dc2626', cafe: '#78350f',
  acucar: '#7c3aed', frango: '#ea580c', suino: '#db2777', trigo: '#b45309',
  arroz: '#0284c7', feijao: '#65a30d', leite: '#0891b2'
};

function fmt(v) {
  return 'R$ ' + v.toLocaleString('pt-BR', {minimumFractionDigits: 2, maximumFractionDigits: 2});
}

function pct(a, b) {
  return ((a - b) / b * 100);
}

function badgeClass(p) {
  if (p > 0.05) return 'up';
  if (p < -0.05) return 'down';
  return 'neutral';
}

function badgeArrow(p) {
  if (p > 0.05) return '▲';
  if (p < -0.05) return '▼';
  return '—';
}

function sparkSVG(values, color, w=80, h=32) {
  if (values.length < 2) return '';
  const min = Math.min(...values);
  const max = Math.max(...values);
  const range = max - min || 1;
  const pad = 3;
  const xs = values.map((_, i) => pad + (i / (values.length - 1)) * (w - pad*2));
  const ys = values.map(v => h - pad - ((v - min) / range) * (h - pad*2));
  const poly = xs.map((x, i) => `${x},${ys[i]}`).join(' ');
  const area = `${xs[0]},${h} ` + poly + ` ${xs[xs.length-1]},${h}`;
  const lx = xs[xs.length-1], ly = ys[ys.length-1];
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
    <polygon points="${area}" fill="${color}" fill-opacity="0.15"/>
    <polyline points="${poly}" fill="none" stroke="${color}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="${lx}" cy="${ly}" r="3" fill="${color}"/>
  </svg>`;
}

function sparkSVGSmall(values, color) {
  return sparkSVG(values, color, 60, 24);
}

async function loadData() {
  try {
    const r = await fetch('precos.json?t=' + Date.now());
    if (!r.ok) throw new Error('Erro ao carregar precos.json');
    return await r.json();
  } catch(e) {
    document.getElementById('cards-grid').innerHTML = `<div class="error-msg">⚠️ Erro ao carregar precos.json: ${e.message}</div>`;
    return null;
  }
}

function buildDashboard(data) {
  const hist = data.historico;
  if (!hist || hist.length < 2) return;

  const janela = hist.slice(-4);
  const atual = janela[janela.length - 1];
  const anterior = janela[janela.length - 2];
  const mais_antiga = janela[0];

  // Header date
  document.getElementById('header-date').textContent = atual.data;
  document.getElementById('section-title').textContent = `📊 Preços · ${atual.data} · Tendência ${janela.length} Semanas`;

  // Build commodity data
  const commodities = atual.commodities.map(c => {
    const id = c.id;
    const valorAtual = c.valor_num;
    const cAnt = anterior.commodities.find(x => x.id === id);
    const cAntiga = mais_antiga.commodities.find(x => x.id === id);
    const valorAnt = cAnt ? cAnt.valor_num : valorAtual;
    const valorAntigo = cAntiga ? cAntiga.valor_num : valorAtual;
    const pctSem = pct(valorAtual, valorAnt);
    const pct4s = pct(valorAtual, valorAntigo);
    const sparkVals = janela.map(s => {
      const found = s.commodities.find(x => x.id === id);
      return found ? found.valor_num : valorAtual;
    });
    const datainicio = janela[0].data;
    const datafim = janela[janela.length-1].data;
    return { id, valorAtual, valorAnt, pctSem, pct4s, sparkVals, datainicio, datafim };
  });

  // Ticker
  const tickerContent = [...commodities, ...commodities].map(c => `
    <span class="ticker-item">
      <span>${ICONS[c.id] || '📦'}</span>
      <span class="ticker-name">${NAMES[c.id] || c.id}</span>
      <span class="ticker-price">${fmt(c.valorAtual)}</span>
      <span class="ticker-var ${badgeClass(c.pctSem)}">${badgeArrow(c.pctSem)}${Math.abs(c.pctSem).toFixed(2)}%</span>
    </span>
  `).join('');
  document.getElementById('ticker-track').innerHTML = tickerContent;

  // Summary chips
  const sorted = [...commodities].sort((a, b) => b.pctSem - a.pctSem);
  const altas = sorted.filter(c => c.pctSem > 0).slice(0, 4);
  const baixas = sorted.filter(c => c.pctSem < 0).reverse().slice(0, 4);

  document.getElementById('altas-chips').innerHTML = altas.map(c =>
    `<span class="summary-chip up">${ICONS[c.id]} ${NAMES[c.id]} +${c.pctSem.toFixed(2)}%</span>`
  ).join('');
  document.getElementById('baixas-chips').innerHTML = baixas.map(c =>
    `<span class="summary-chip down">${ICONS[c.id]} ${NAMES[c.id]} ${c.pctSem.toFixed(2)}%</span>`
  ).join('');

  // Cards
  const grid = document.getElementById('cards-grid');
  grid.innerHTML = commodities.map(c => {
    const color = COLORS[c.id] || '#4a9e6b';
    const spark = sparkSVG(c.sparkVals, color);
    const bcSem = badgeClass(c.pctSem);
    const bc4s = badgeClass(c.pct4s);
    return `
      <a class="card" href="${CEPEA[c.id] || '#'}" target="_blank">
        <div class="card-top">
          <span class="card-icon">${ICONS[c.id] || '📦'}</span>
          <div class="card-spark">${spark}</div>
        </div>
        <div style="font-size:9px;color:var(--text-light);text-align:right;margin-top:-4px;margin-bottom:6px;font-family:'DM Mono',monospace;">
          ${c.datainicio} → ${c.datafim}
        </div>
        <div class="card-name">${NAMES[c.id] || c.id}</div>
        <div class="card-price">${fmt(c.valorAtual)}</div>
        <div class="card-unit">${UNITS[c.id] || ''}</div>
        <div class="card-divider"></div>
        <div class="card-stats">
          <div class="card-stat">
            <span class="stat-label">Semana ant.</span>
            <span class="stat-value">${fmt(c.valorAnt)}</span>
          </div>
          <div class="card-stat">
            <span class="stat-label">Var. semana</span>
            <span class="badge ${bcSem}">${badgeArrow(c.pctSem)} ${Math.abs(c.pctSem).toFixed(2)}%</span>
          </div>
          <div class="card-stat">
            <span class="stat-label">Var. 4 sem.</span>
            <span class="badge ${bc4s}">${badgeArrow(c.pct4s)} ${Math.abs(c.pct4s).toFixed(2)}%</span>
          </div>
        </div>
        <div class="card-footer">
          <span>CEPEA/ESALQ · ${c.datafim}</span>
          <span style="color:var(--green-accent);">↗</span>
        </div>
      </a>
    `;
  }).join('');

  // Table
  const tbody = document.getElementById('table-body');
  tbody.innerHTML = commodities.map(c => {
    const color = COLORS[c.id] || '#4a9e6b';
    const spark = sparkSVGSmall(c.sparkVals, color);
    const bcSem = badgeClass(c.pctSem);
    const bc4s = badgeClass(c.pct4s);
    return `
      <tr>
        <td>
          <div class="td-commodity">
            <span class="td-icon">${ICONS[c.id] || '📦'}</span>
            <div>
              <div class="td-name">${NAMES[c.id] || c.id}</div>
              <div class="td-unit">${UNITS[c.id] || ''}</div>
            </div>
          </div>
        </td>
        <td class="td-spark">${spark}</td>
        <td class="td-price">${fmt(c.valorAnt)}</td>
        <td class="td-price" style="font-weight:700;">${fmt(c.valorAtual)}</td>
        <td><span class="badge ${bcSem}">${badgeArrow(c.pctSem)} ${Math.abs(c.pctSem).toFixed(2)}%</span></td>
        <td><span class="badge ${bc4s}">${badgeArrow(c.pct4s)} ${Math.abs(c.pct4s).toFixed(2)}%</span></td>
      </tr>
    `;
  }).join('');
}

(async () => {
  const data = await loadData();
  if (data) buildDashboard(data);
})();
</script>
</body>
</html>
